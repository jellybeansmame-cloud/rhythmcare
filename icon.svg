    <linearGradient id="leaf2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6c4"/>
      <stop offset="100%" stop-color="#90c49a"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
