  <path d="M258 230 Q300 228 335 222" stroke="#7cb87a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M260 250 Q295 248 318 244" stroke="#7cb87a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 左の葉 -->
  <path d="M245 290 Q175 250 140 280 Q155 350 215 355 Q242 345 245 290Z" fill="url(#leaf2)"/>
  <!-- 葉脈（左） -->
