name: Asuken Sync

on:
  schedule:
    # 毎日 24:00 JST = 0:00 JST (15:00 UTC)
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r asken-sync/requirements.txt
          playwright install chromium

      - name: Sync from Asuken
        env:
          FIREBASE_UID: ${{ secrets.FIREBASE_UID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          ASKEN_EMAIL: ${{ secrets.ASKEN_EMAIL }}
          ASKEN_PASSWORD: ${{ secrets.ASKEN_PASSWORD }}
        run: |
          DATE=$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('Asia/Tokyo')).strftime('%Y-%m-%d'))")
          python asken-sync/sync_day.py --push --date "$DATE"
