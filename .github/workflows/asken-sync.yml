name: Asuken Sync

on:
  schedule:
    # 毎日 1:00 JST (16:00 UTC)
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r asken-sync/requirements.txt
          playwright install chromium

      - name: Sync from Asuken
        env:
          FIREBASE_UID: ${{ secrets.FIREBASE_UID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          ASKEN_EMAIL: ${{ secrets.ASKEN_EMAIL }}
          ASKEN_PASSWORD: ${{ secrets.ASKEN_PASSWORD }}
        run: |
          # 1:00 JST 実行 = 日付は翌日なので「前日分」を取得
          DATE=$(python -c "from datetime import datetime, timedelta; from zoneinfo import ZoneInfo; print((datetime.now(ZoneInfo('Asia/Tokyo')).date() - timedelta(days=1)).strftime('%Y-%m-%d'))")
          echo "Sync target date: $DATE"
          python asken-sync/sync_day.py --push --date "$DATE"
