name: Asuken Sync

on:
  schedule:
    # 毎日 22:00 JST (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r asken-sync/requirements.txt
          playwright install chromium

      - name: Sync from Asuken
        env:
          FIREBASE_UID: ${{ secrets.FIREBASE_UID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python asken-sync/sync_day.py --push
